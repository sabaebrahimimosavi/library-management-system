<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Permission denied</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #eee8dc;
      color: #25303b;
      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    .permission-card {
      width: 100%;
      max-width: 540px;
      padding: 46px;
      border: 1px solid #b9ad98;
      border-radius: 12px;
      background: #fffdf8;
      box-shadow:
        0 15px 40px
        rgba(30, 35, 40, 0.12);
      text-align: center;
    }

    .status {
      margin: 0 0 12px;
      color: #9d332f;
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-family:
        Georgia,
        "Times New Roman",
        serif;
      font-size: 2.1rem;
    }

    p {
      margin: 0 0 30px;
      color: #606872;
      line-height: 1.7;
    }

    a {
      display: inline-block;
      padding: 11px 22px;
      border-radius: 6px;
      background: #25384a;
      color: white;
      text-decoration: none;
    }

    a:hover {
      background: #182736;
    }
  </style>
</head>

<body>
  <main class="permission-card">
    <p class="status">403 — Access denied</p>

    <h1>You do not have permission</h1>

    <p>
      The Django administration area is available
      only to library administrators. Log in through
      the library using an administrator account.
    </p>

    <a href="/">
      Return to the library
    </a>
  </main>
</body>
</html>
